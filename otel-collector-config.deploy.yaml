# OpenTelemetry Collector Configuration — Deployed (Staging & Production)
#
# Primary exporter: SigNoz (OTLP).

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  # Primary observability backend
  otlp/signoz:
    endpoint: ${SIGNOZ_OTLP_ENDPOINT}
    tls:
      insecure: true
    headers:
      'signoz-access-token': '${SIGNOZ_ACCESS_TOKEN}'

  logging:
    loglevel: info

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/signoz]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/signoz]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/signoz]

  extensions: [health_check]

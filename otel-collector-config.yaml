# OpenTelemetry Collector Configuration
# Used in both Docker Compose (local dev) and Fly.io (production sidecar)
#
# Receivers: Listen for telemetry from the app
# Processors: Transform and batch telemetry
# Exporters: Send telemetry to backends (SigNoz, LGTM, etc.)
# Service: Connect receivers → processors → exporters

receivers:
  # OTLP HTTP receiver (default port 4318)
  # App sends telemetry here: http://127.0.0.1:4318 or http://otel-collector:4318
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://127.0.0.1:5173
            - http://127.0.0.1:3003
            - http://localhost:5173
            - http://localhost:3003
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  # Batch processor: Collects spans/metrics/logs and sends them in batches
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  # ── LGTM / Centralized OTLP Exporter ────────────────────────────────
  # used for local development and centralized tracing.
  # sends OTLP to the host-based LGTM stack (Loki, Tempo, Mimir).
  otlp/lgtm:
    endpoint: ${LGTM_OTLP_ENDPOINT}
    tls:
      insecure: true

  # ── SigNoz OTLP Exporter ────────────────────────────────────────────
  # used for staging/production as primary observability.
  otlp/signoz:
    endpoint: ${SIGNOZ_OTLP_ENDPOINT}
    tls:
      insecure: true
    headers:
      'signoz-access-token': '${SIGNOZ_ACCESS_TOKEN}'

  # Debugging: Logging exporter (useful for verifying data arrives at collector)
  logging:
    verbosity: detailed

extensions:
  # Health check endpoint: Used by Fly.io and docker-compose health checks
  health_check:
    endpoint: 0.0.0.0:13133

service:
  # Pipelines define the flow: receiver → processors → exporter
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters:
        - ${OTEL_COLLECTOR_PRIMARY_EXPORTER}

    # Metrics: App → OTLP receiver → batch → [Sentry OR LGTM]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters:
        - ${OTEL_COLLECTOR_PRIMARY_EXPORTER}

    # Logs: App → OTLP receiver → batch → [Sentry OR LGTM]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters:
        - ${OTEL_COLLECTOR_PRIMARY_EXPORTER}

  extensions: [health_check]

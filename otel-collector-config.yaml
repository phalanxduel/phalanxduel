# OpenTelemetry Collector Configuration
# Used in both Docker Compose (local dev) and Fly.io (production sidecar)
#
# Receivers: Listen for telemetry from the app
# Processors: Transform and batch telemetry
# Exporters: Send telemetry to backends (Sentry, SigNoz, etc.)
# Service: Connect receivers → processors → exporters

receivers:
  # OTLP HTTP receiver (default port 4318)
  # App sends telemetry here: http://localhost:4318 or http://otel-collector:4318
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  # Batch processor: Collects spans/metrics/logs and sends them in batches
  # Reduces network overhead and improves throughput
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  # ── Sentry OTLP Exporter ────────────────────────────────────────────
  # Modern OTLP-based export to Sentry.
  # Used in Staging and Production.
  otlphttp/sentry:
    traces_endpoint: ${SENTRY_OTLP_TRACES_ENDPOINT}
    logs_endpoint: ${SENTRY_OTLP_LOGS_ENDPOINT}
    headers:
      x-sentry-auth: ${SENTRY_OTLP_AUTH_HEADER}
    compression: gzip
    encoding: proto
    timeout: 30s

  # ── SigNoz / Local OTLP Exporter ────────────────────────────────────
  # used for local development (signoz in docker or bare metal).
  # endpoint should include port (e.g., localhost:4317 or ingest.signoz.io:443)
  otlp/signoz:
    endpoint: ${SIGNOZ_OTLP_ENDPOINT}
    tls:
      insecure: ${SIGNOZ_INSECURE}
    headers:
      signoz-access-token: ${SIGNOZ_ACCESS_TOKEN}

  # Debugging: Logging exporter (useful for verifying data arrives at collector)
  logging:
    loglevel: info

extensions:
  # Health check endpoint: Used by Fly.io and docker-compose health checks
  health_check:
    endpoint: 0.0.0.0:13133

service:
  # Pipelines define the flow: receiver → processors → exporter
  pipelines:
    # Traces: App → OTLP receiver → batch → [Sentry OR SigNoz]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters:
        - ${OTEL_COLLECTOR_PRIMARY_EXPORTER}

    # Metrics: App → OTLP receiver → batch → [Sentry OR SigNoz]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters:
        - ${OTEL_COLLECTOR_PRIMARY_EXPORTER}

    # Logs: App → OTLP receiver → batch → [Sentry OR SigNoz]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters:
        - ${OTEL_COLLECTOR_PRIMARY_EXPORTER}

  extensions: [health_check]

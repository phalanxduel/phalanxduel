asyncapi: '2.6.0'
id: 'urn:phalanxduel:ws:protocol'
defaultContentType: application/json
info:
  title: Phalanx Duel WebSocket Protocol
  version: '0.5.0-rev.1'
  contact:
    name: Phalanx Duel
    url: https://github.com/phalanxduel/game
    email: maintainers@phalanxduel.com
  license:
    name: UNLICENSED
  description: |
    Real-time gameplay protocol for Phalanx Duel.

    Authoritative references:

    - [RULES.md](https://github.com/phalanxduel/game/blob/main/docs/RULES.md) for the
      deterministic game rules and state machine.
    - [shared/src/schema.ts](https://github.com/phalanxduel/game/blob/main/shared/src/schema.ts)
      for the canonical schema source.
    - [client-messages.schema.json](https://github.com/phalanxduel/game/blob/main/shared/schemas/client-messages.schema.json)
      and [server-messages.schema.json](https://github.com/phalanxduel/game/blob/main/shared/schemas/server-messages.schema.json)
      for the generated JSON Schema artifacts that back this AsyncAPI document.

    State-machine constraints:

    - `deploy` is only valid during `DeploymentPhase`.
    - `attack` and `pass` are only valid during `AttackPhase`.
    - `reinforce` is only valid during `ReinforcementPhase`.
    - `forfeit` is valid in any phase.
tags:
  - name: gameplay
    description: Real-time Phalanx Duel gameplay operations over WebSocket.
servers:
  local:
    url: 127.0.0.1:3001
    protocol: ws
    description: Local development server.
  production:
    url: play.phalanxduel.com
    protocol: wss
    description: Production game server.
channels:
  /ws:
    description: Bidirectional gameplay socket used for match creation, joining, and turn actions.
    publish:
      summary: Client-to-server gameplay messages.
      operationId: publishClientMessage
      message:
        oneOf:
          - $ref: '#/components/messages/CreateMatchMessage'
          - $ref: '#/components/messages/JoinMatchMessage'
          - $ref: '#/components/messages/RejoinMatchMessage'
          - $ref: '#/components/messages/WatchMatchMessage'
          - $ref: '#/components/messages/ActionMessage'
          - $ref: '#/components/messages/AuthenticateMessage'
    subscribe:
      summary: Server-to-client gameplay events.
      operationId: subscribeServerMessage
      message:
        oneOf:
          - $ref: '#/components/messages/MatchCreatedMessage'
          - $ref: '#/components/messages/GameStateMessage'
          - $ref: '#/components/messages/GameViewModelMessage'
          - $ref: '#/components/messages/ActionErrorMessage'
          - $ref: '#/components/messages/MatchErrorMessage'
          - $ref: '#/components/messages/MatchJoinedMessage'
          - $ref: '#/components/messages/SpectatorJoinedMessage'
          - $ref: '#/components/messages/OpponentDisconnectedMessage'
          - $ref: '#/components/messages/OpponentReconnectedMessage'
          - $ref: '#/components/messages/AuthenticatedMessage'
          - $ref: '#/components/messages/AuthErrorMessage'
components:
  messages:
    CreateMatchMessage:
      name: CreateMatchMessage
      messageId: CreateMatchMessage
      title: createMatch
      summary: Create a new match, optionally against a bot.
      payload:
        $ref: '../../shared/schemas/client-messages.schema.json#/oneOf/0'
    JoinMatchMessage:
      name: JoinMatchMessage
      messageId: JoinMatchMessage
      title: joinMatch
      summary: Join an existing match as the second player.
      payload:
        $ref: '../../shared/schemas/client-messages.schema.json#/oneOf/1'
    RejoinMatchMessage:
      name: RejoinMatchMessage
      messageId: RejoinMatchMessage
      title: rejoinMatch
      summary: Rejoin an active match with the secret player ID.
      payload:
        $ref: '../../shared/schemas/client-messages.schema.json#/oneOf/2'
    WatchMatchMessage:
      name: WatchMatchMessage
      messageId: WatchMatchMessage
      title: watchMatch
      summary: Join a match as a spectator.
      payload:
        $ref: '../../shared/schemas/client-messages.schema.json#/oneOf/3'
    ActionMessage:
      name: ActionMessage
      messageId: ActionMessage
      title: action
      summary: Submit a gameplay action for the current turn.
      payload:
        $ref: '../../shared/schemas/client-messages.schema.json#/oneOf/4'
    AuthenticateMessage:
      name: AuthenticateMessage
      messageId: AuthenticateMessage
      title: authenticate
      summary: Authenticate the socket session with a JWT.
      payload:
        $ref: '../../shared/schemas/client-messages.schema.json#/oneOf/5'
    MatchCreatedMessage:
      name: MatchCreatedMessage
      messageId: MatchCreatedMessage
      title: matchCreated
      summary: Confirms successful match creation and returns the secret player ID.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/0'
    GameStateMessage:
      name: GameStateMessage
      messageId: GameStateMessage
      title: gameState
      summary: Turn result plus the fog-of-war filtered view model for the recipient.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/1'
    GameViewModelMessage:
      name: GameViewModelMessage
      messageId: GameViewModelMessage
      title: gameViewModel
      summary: Legacy filtered game-state projection sent to waiting players and spectators.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/2'
    ActionErrorMessage:
      name: ActionErrorMessage
      messageId: ActionErrorMessage
      title: actionError
      summary: Action-level validation failure.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/3'
    MatchErrorMessage:
      name: MatchErrorMessage
      messageId: MatchErrorMessage
      title: matchError
      summary: Match-level failure such as a full or missing match.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/4'
    MatchJoinedMessage:
      name: MatchJoinedMessage
      messageId: MatchJoinedMessage
      title: matchJoined
      summary: Confirms a successful join or rejoin.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/5'
    SpectatorJoinedMessage:
      name: SpectatorJoinedMessage
      messageId: SpectatorJoinedMessage
      title: spectatorJoined
      summary: Confirms spectator attachment to the match.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/6'
    OpponentDisconnectedMessage:
      name: OpponentDisconnectedMessage
      messageId: OpponentDisconnectedMessage
      title: opponentDisconnected
      summary: Opponent socket disconnected.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/7'
    OpponentReconnectedMessage:
      name: OpponentReconnectedMessage
      messageId: OpponentReconnectedMessage
      title: opponentReconnected
      summary: Opponent socket reconnected.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/8'
    AuthenticatedMessage:
      name: AuthenticatedMessage
      messageId: AuthenticatedMessage
      title: authenticated
      summary: JWT authentication succeeded.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/9'
    AuthErrorMessage:
      name: AuthErrorMessage
      messageId: AuthErrorMessage
      title: auth_error
      summary: JWT authentication failed.
      payload:
        $ref: '../../shared/schemas/server-messages.schema.json#/oneOf/10'

# Phalanx Duel — Fly.io Configuration (Production)
#
# Deploy: fly deploy --app phalanxduel-production --config fly.production.toml

app = "phalanxduel-production"
primary_region = "ord"
kill_signal = "SIGTERM"
kill_timeout = "35s"

[build]

[processes]
web = "node server/dist/index.js"
admin = "node admin/dist/server/index.js"
otel = "/app/otel-collector/otelcol-contrib --config=/app/otel-collector-config.yaml"

[deploy]
release_command = "node server/dist/db/migrate.js"
strategy = "rolling"

[env]
APP_ENV = "production"
NODE_ENV = "production"
PHALANX_SERVER_PORT = "3001"
OTEL_EXPORTER_OTLP_ENDPOINT = "http://127.0.0.1:4318"

[[statics]]
guest_path = "/app/client/dist"
url_prefix = "/"

[http_service]
internal_port = 3001
processes = ["web"]
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[http_service.concurrency]
type = "requests"
soft_limit = 200
hard_limit = 250

[[http_service.checks]]
grace_period = "20s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/health"

[[http_service.checks]]
grace_period = "5s"
interval = "20s"
method = "GET"
timeout = "2s"
path = "/ready"

[[vm]]
cpu_kind = "shared"
cpus = 2
memory_mb = 1024

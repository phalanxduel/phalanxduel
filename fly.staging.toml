# fly.staging.toml - Phalanx Duel Staging Configuration
# Documentation: https://fly.io/docs/reference/configuration/

app = "phalanxduel-staging"
primary_region = "ord"
kill_signal = "SIGTERM"
kill_timeout = "35s"

[build]

[deploy]
  # Run migrations before the new version starts taking traffic
  release_command = "node server/dist/db/migrate.js"
  strategy = "rolling"

[env]
  APP_ENV = "staging"
  NODE_ENV = "production"
  PHALANX_SERVER_PORT = "3001"

# Serve the static client assets from the Fly.io edge cache for performance.
[[statics]]
  guest_path = "/app/client/dist"
  url_prefix = "/"

[http_service]
  internal_port = 3001
  force_https = true
  # Cost optimization: Stop machines when no traffic, restart on request
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  
  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 75

  # Liveness check (is the process alive?)
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

  # Readiness check (is the app ready to take traffic?)
  [[http_service.checks]]
    grace_period = "5s"
    interval = "20s"
    method = "GET"
    timeout = "2s"
    path = "/ready"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

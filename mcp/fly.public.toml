# MCP public endpoint — read-only engine + data tools, no auth required
# Deploy: fly deploy --app phalanxduel-mcp-public --config mcp/fly.public.toml
# Secrets:  fly secrets set DATABASE_URL=... --app phalanxduel-mcp-public

app = "phalanxduel-mcp-public"
primary_region = "ord"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "mcp/Dockerfile"

[env]
  TOOL_PROFILE = "public"
  TRANSPORT = "http"
  MCP_PORT = "8080"
  APP_ENV = "production"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

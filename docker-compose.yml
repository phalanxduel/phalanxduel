# docker-compose.yml — Multi-profile local development environment
#
# Profiles:
#   dev         — Game server + admin + Postgres + Grafana LGTM (traces/metrics/logs)
#   staging     — Production image with staging-like config (OTel collector)
#   production  — Production image, minimal config, non-root user
#
# Usage:
#   docker compose --profile dev up --build          # Local development
#   docker compose --profile dev run --rm -e DATABASE_URL= app-dev pnpm -r test  # Run tests
#   docker compose --profile staging up --build      # Staging-like local
#   docker compose --profile production up --build   # Production-like local
#   docker compose down -v                           # Teardown + wipe volumes

services:
  # ── Shared infrastructure (always starts) ───────────────────────────

  postgres:
    image: postgres:17-alpine
    container_name: phalanx-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phalanxduel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - phalanx
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Dev observability: centralized collector intake on the LGTM path ─────
  # In the dev profile, app containers emit to the host collector intake at
  # http://host.docker.internal:4318. That host endpoint is the collector
  # boundary for the centralized LGTM stack managed outside this Compose file.

  # ── Staging/Production observability: local collector tier ────────────────
  # Routes telemetry from app containers to the centralized collector intake
  # on the LGTM path.
  # Uses otel-collector.compose.yaml for pipeline definitions.

  otel-collector:
    profiles: ['staging', 'production']
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: phalanx-otel-collector
    command:
      - '--config=/etc/otelcol-contrib/otel-collector.compose.yaml'
    volumes:
      - ./otel-collector.compose.yaml:/etc/otelcol-contrib/otel-collector.compose.yaml
    environment:
      LGTM_OTLP_ENDPOINT: ${LGTM_OTLP_ENDPOINT:-host.docker.internal:4417}
      APP_ENV: development
    ports:
      - '4318:4318' # OTLP HTTP
      - '4317:4317' # OTLP gRPC
      - '13133:13133' # Health check
    networks:
      - phalanx
    restart: unless-stopped

  # ── Dev profile ─────────────────────────────────────────────────────
  # Source maps, debug inspector, all devDependencies, verbose logging.
  # Source directories mounted for hot reload on rebuild.

  app-dev:
    profiles: ['dev']
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: phalanx-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      APP_ENV: development
      LOG_LEVEL: debug
      PHALANX_SERVER_PORT: '3001'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/phalanxduel # secretlint-disable-line
      JWT_SECRET: phalanx-dev-secret
      ADMIN_INTERNAL_TOKEN: phalanx-dev-admin-token
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_SERVICE_NAME: phx-server
      OTEL_CONSOLE_LOGS_ENABLED: '1'
    ports:
      - '3001:3001' # App HTTP + WebSocket
      - '9229:9229' # Node.js inspector (Chrome DevTools / VS Code)
    volumes:
      # Mount source for hot reload (rebuild container to pick up changes)
      - ./server/src:/app/server/src
      - ./shared/src:/app/shared/src
      - ./engine/src:/app/engine/src
      - ./client/src:/app/client/src
      - ./admin/src:/app/admin/src
    networks:
      - phalanx
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  admin-dev:
    profiles: ['dev']
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: phalanx-admin
    depends_on:
      app-dev:
        condition: service_healthy
    environment:
      NODE_ENV: development
      APP_ENV: development
      LOG_LEVEL: debug
      PHALANX_ADMIN_PORT: '3002'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/phalanxduel # secretlint-disable-line
      JWT_SECRET: phalanx-dev-secret
      GAME_SERVER_INTERNAL_URL: http://phalanx-app:3001
      ADMIN_INTERNAL_TOKEN: phalanx-dev-admin-token
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_SERVICE_NAME: phx-admin
      OTEL_CONSOLE_LOGS_ENABLED: '1'
    ports:
      - '3002:3002' # Admin console
    networks:
      - phalanx
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3002/']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    command: ['pnpm', 'tsx', 'admin/src/server/index.ts']

  # ── Staging profile ─────────────────────────────────────────────────
  # Production image with staging-like config. Matches fly.staging.toml.

  app-staging:
    profiles: ['staging']
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phalanx-app
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      NODE_ENV: production
      APP_ENV: staging
      PHALANX_SERVER_PORT: '3001'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/phalanxduel # secretlint-disable-line
      JWT_SECRET: ${JWT_SECRET:-phalanx-dev-secret}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: phx-server
    ports:
      - '3001:3001'
    networks:
      - phalanx
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Production profile ──────────────────────────────────────────────
  # Production image, non-root user, no dev deps, minimal attack surface.

  app-production:
    profiles: ['production']
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phalanx-app
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      NODE_ENV: production
      APP_ENV: production
      PHALANX_SERVER_PORT: '3001'
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/phalanxduel} # secretlint-disable-line
      JWT_SECRET: ${JWT_SECRET:-} # MUST be set for production — app errors on startup if empty
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: phx-server
    ports:
      - '3001:3001'
    networks:
      - phalanx
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  phalanx:
    driver: bridge

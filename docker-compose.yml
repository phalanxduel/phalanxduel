# docker-compose.yml — Tooling & Automation Environment
#
# Profiles:
#   dev         — Automation & verification container
#   staging     — Production image with staging-like config
#   production  — Production image, minimal config, non-root user
#
# Usage:
#   bin/dock pnpm test                               # Run tests in automation container
#   docker compose --profile staging up --build      # Staging-like local
#   docker compose --profile production up --build   # Production-like local
#   docker compose down -v                           # Teardown + wipe volumes

services:
  # ── Tooling & Verification (dev profile) ───────────────────────────

  automation:
    profiles: ['dev']
    build:
      context: .
      dockerfile: Dockerfile.automation
    container_name: phalanx-automation
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: development
      APP_ENV: development
      DATABASE_URL: postgresql://mike@host.docker.internal:5432/phalanxduel # secretlint-disable-line
      JWT_SECRET: phalanx-dev-secret
      ADMIN_INTERNAL_TOKEN: phalanx-dev-admin-token
      PHALANX_API_HOST: host.docker.internal
      PHALANX_API_PORT: 3001
      PHALANX_WS_URL: ws://host.docker.internal:3001/ws
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_SERVICE_NAME: phx-automation
      OTEL_CONSOLE_LOGS_ENABLED: '1'
      DISPLAY: :0
      SCREEN_WIDTH: 1600
      SCREEN_HEIGHT: 1440
    ports:
      - '6080:6080' # noVNC (Browser-based visibility)
      - '5900:5900' # VNC (Direct VNC client)
    volumes:
      - .:/app
      # Use an anonymous volume to prevent container's node_modules from leaking to host
      # This is critical for host-native dev performance to avoid node_modules collisions.
      - /app/node_modules
      - /app/shared/node_modules
      - /app/engine/node_modules
      - /app/server/node_modules
      - /app/client/node_modules
      - /app/admin/node_modules
    networks:
      - phalanx
    command: ['tail', '-f', '/dev/null']

  # ── Staging profile ─────────────────────────────────────────────────
  # Production image with staging-like config. Matches fly.staging.toml.

  app-staging:
    profiles: ['staging']
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phalanx-app
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
      APP_ENV: staging
      PHALANX_SERVER_PORT: '3001'
      DATABASE_URL: postgresql://mike@host.docker.internal:5432/phalanxduel # secretlint-disable-line
      JWT_SECRET: ${JWT_SECRET:-phalanx-dev-secret}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_SERVICE_NAME: phx-server
    ports:
      - '3001:3001'
    networks:
      - phalanx
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Production profile ──────────────────────────────────────────────
  # Production image, non-root user, no dev deps, minimal attack surface.

  app-production:
    profiles: ['production']
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phalanx-app
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
      APP_ENV: production
      PHALANX_SERVER_PORT: '3001'
      DATABASE_URL: ${DATABASE_URL:-postgresql://host.docker.internal:5432/phalanxduel_development} # secretlint-disable-line
      JWT_SECRET: ${JWT_SECRET:-} # MUST be set for production — app errors on startup if empty
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_SERVICE_NAME: phx-server
    ports:
      - '3001:3001'
    networks:
      - phalanx
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

networks:
  phalanx:
    driver: bridge

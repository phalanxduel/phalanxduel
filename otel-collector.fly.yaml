# OpenTelemetry Collector Configuration — Deployed (Staging & Production)
#
# Primary exporter: centralized LGTM (OTLP).

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  # Primary observability backend
  otlp/lgtm:
    endpoint: ${LGTM_OTLP_ENDPOINT}
    tls:
      insecure: true

  logging:
    loglevel: info

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/lgtm]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/lgtm]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/lgtm]

  extensions: [health_check]

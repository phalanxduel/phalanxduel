name: Manual Production Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: manual-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: https://play.phalanxduel.com
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy production from source
        run: |
          commit_sha="$(git rev-parse HEAD)"
          build_number="$(date -u +%Y%m%dT%H%M%SZ)"
          flyctl deploy \
            --app phalanxduel-production \
            --config fly.production.toml \
            --remote-only \
            --build-arg "GIT_COMMIT_SHA=${commit_sha}" \
            --build-arg "BUILD_NUMBER=${build_number}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify production health
        run: |
          curl -fsS https://play.phalanxduel.com/health
          curl -fsS https://play.phalanxduel.com/ready

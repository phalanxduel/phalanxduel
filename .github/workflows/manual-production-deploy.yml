name: Manual Production Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref containing the matching Fly configuration
        required: true
        default: main
      image_ref:
        description: Content-addressed GHCR image reference (repository@sha256:digest)
        required: true

permissions:
  contents: read
  packages: read

concurrency:
  group: manual-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: https://play.phalanxduel.com
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull immutable release image
        run: |
          docker pull "${{ inputs.image_ref }}"
          docker tag "${{ inputs.image_ref }}" phalanxduel-production:manual
          docker tag "${{ inputs.image_ref }}" phalanxduel-admin:manual

      - name: Deploy game from immutable image
        run: |
          flyctl deploy \
            --app phalanxduel-production \
            --config fly.production.toml \
            --local-only \
            --image phalanxduel-production:manual
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy admin from immutable image
        run: |
          flyctl deploy \
            --app phalanxduel-admin \
            --config admin/fly.toml \
            --local-only \
            --image phalanxduel-admin:manual
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify production health
        run: |
          curl -fsS https://play.phalanxduel.com/health
          curl -fsS https://play.phalanxduel.com/ready
          curl -fsS https://phalanxduel-admin.fly.dev/health
          curl -fsS https://phalanxduel-admin.fly.dev/ready

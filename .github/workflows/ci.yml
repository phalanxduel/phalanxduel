name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Prune pnpm store
        run: corepack pnpm deps:prune-store

      - name: Dependency security audit (production)
        run: |
          echo "🔍 Running production dependency security audit..."
          AUDIT_OUTPUT=$(corepack pnpm audit --prod 2>&1)
          echo "$AUDIT_OUTPUT"
          
          # Fail if any vulnerabilities found in production
          if echo "$AUDIT_OUTPUT" | grep -q "vulnerabilities found"; then
            echo "❌ Production vulnerabilities detected!"
            exit 1
          fi
          echo "✅ Production dependencies clean (no vulnerabilities)"

      - name: Dependency security audit (all - info only)
        continue-on-error: true
        run: |
          echo "ℹ️  Running full dependency audit (dev + prod)..."
          corepack pnpm audit 2>&1 | tee audit-report.txt || true
          echo "" >> audit-report.txt
          echo "**Note**: Dev-only vulnerabilities are flagged but don't block CI." >> audit-report.txt
          echo "Production audit must pass (see above for production-only check)." >> audit-report.txt

      - name: Upload audit report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.1.1
        if: always()
        with:
          name: dependency-audit
          path: audit-report.txt

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Build
        run: corepack pnpm build

      - name: Test
        run: corepack pnpm test

      - name: Schema check
        run: corepack pnpm schema:check

      - name: Rules/FSM consistency check
        run: corepack pnpm rules:check

      - name: Documentation artifact check
        run: corepack pnpm docs:check

      - name: Markdown lint
        run: corepack pnpm lint:md

      - name: Format check
        run: corepack pnpm format:check

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b664febf0eb4e70ffe034e8757371bcbb8 # v3.3.1

      - name: Build Docker image
        uses: docker/build-push-action@31159d49c0d4756269a0940a750f1daaf5d3f3d7 # v5.1.0
        with:
          context: .
          push: false
          load: true
          tags: phalanxduel:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check Docker image size
        run: |
          IMAGE_SIZE=$(docker image inspect phalanxduel:ci --format='{{.Size}}')
          SIZE_MB=$((IMAGE_SIZE / 1024 / 1024))
          echo "📦 Docker image size: ${SIZE_MB}MB"
          
          # Check against limit
          LIMIT_MB=350
          if [ $SIZE_MB -gt $LIMIT_MB ]; then
            echo "❌ Image exceeds ${LIMIT_MB}MB limit (${SIZE_MB}MB)"
            exit 1
          fi
          echo "✅ Image size within limits (<${LIMIT_MB}MB)"
          
          # Store metric for artifact
          echo "${SIZE_MB}" > image-size-mb.txt

      - name: Analyze Docker image layers
        run: |
          echo "## Docker Image Layer Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          docker history phalanxduel:ci --human --no-trunc | head -20 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          SIZE_MB=$(cat image-size-mb.txt)
          echo "**Total Size**: ${SIZE_MB}MB (Limit: 350MB)" >> $GITHUB_STEP_SUMMARY

      - name: Upload image size metric
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.1.1
        with:
          name: docker-metrics
          path: image-size-mb.txt

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Prune pnpm store
        run: corepack pnpm deps:prune-store

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Build
        run: corepack pnpm build

      - name: Test
        run: corepack pnpm test

      - name: Schema check
        run: corepack pnpm schema:check

      - name: Rules/FSM consistency check
        run: corepack pnpm rules:check

      - name: Documentation artifact check
        run: corepack pnpm docs:check

      - name: Markdown lint
        run: corepack pnpm lint:md

      - name: Format check
        run: corepack pnpm format:check

name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.4.4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: CI Checks
        run: corepack pnpm check:ci

  build:
    name: Build and Push
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@327cd5a69deefc01ef97f1a08a85e05224922df2 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ca7d121843bc5d27b201281017f61178e7 # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            latest-main

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SENTRY__CLIENT__SENTRY_DSN=${{ secrets.SENTRY__CLIENT__SENTRY_DSN }}
          secrets: |
            "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}"

  scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scan
        uses: aquasec/trivy-action@18f2514ee906fbd63932f144c50c0b66e2bda2db # v0.29.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@6bb031afdd8ca866ee30b67ef7497d1234b77a17 # v3.28.11
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

  deploy-staging:
    name: 'Deploy: Staging'
    needs: [build, scan]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://phalanxduel-staging.fly.dev
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@80002f3066006ebca00dbda690cdccbb9dc000ca # v1.5

      - name: Deploy to Fly.io
        run: |
          flyctl deploy \
            --app phalanxduel-staging \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
            --config fly.staging.toml \
            --remote-only \
            --env APP_ENV=staging \
            --env NODE_ENV=production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}

  promote-production:
    name: 'Promote: Production'
    needs: [build, scan, deploy-staging]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://play.phalanxduel.com
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@80002f3066006ebca00dbda690cdccbb9dc000ca # v1.5

      - name: Deploy to Fly.io
        run: |
          flyctl deploy \
            --app phalanxduel-production \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
            --config fly.production.toml \
            --remote-only \
            --env APP_ENV=production \
            --env NODE_ENV=production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

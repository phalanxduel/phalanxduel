name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  HUSKY: '0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  test:
    name: Test and Lint
    # [Agent Guidance] This job enforces the 'Playability Gate' (AGENTS.md).
    # It proves the game is playable and testable via CI checks and UI playthroughs.
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: phalanxduel_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://phalanx_test:phx_test_local@postgres:5432/phalanxduel_test # secretlint-disable-line
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix git directory ownership
        run: git config --global --add safe.directory '*'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            sdk/go/go.sum
            clients/go/duel-cli/go.sum

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: |
          sudo apt-get update || apt-get update
          sudo apt-get install -y postgresql-client default-jre || apt-get install -y postgresql-client default-jre

      - name: Setup database users
        run: |
          psql postgresql://postgres@postgres:5432/phalanxduel_test -c "
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE USER phalanx_test WITH LOGIN PASSWORD 'phx_test_local';
            ALTER SCHEMA public OWNER TO phalanx_test;
            GRANT CONNECT ON DATABASE phalanxduel_test TO phalanx_test;
            GRANT CREATE ON DATABASE phalanxduel_test TO phalanx_test;
            GRANT CREATE, USAGE ON SCHEMA public TO phalanx_test;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES    TO phalanx_test;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO phalanx_test;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO phalanx_test;
            GRANT TEMP ON DATABASE phalanxduel_test TO phalanx_test;
          "

      - name: Dependency audit
        run: corepack pnpm audit --audit-level=high

      - name: GHA Pinning Audit
        run: bash scripts/ci/audit-gha-pinning.sh

      - name: CI Checks
        id: ci_checks
        timeout-minutes: 30
        run: |
          corepack pnpm build
          corepack pnpm openapi:gen
          corepack pnpm sdk:gen
          corepack pnpm --filter @phalanxduel/server db:migrate
          corepack pnpm verify:ci

      - name: Gameplay Trust Gate Summary
        if: always()
        run: |
          {
            echo "## Gameplay Trust Gates"
            echo ""
            echo "| Gate | Protected lane | Evidence |"
            echo "|---|---|---|"
            echo "| Coverage reporting | test / verify:ci | coverage-reports artifact |"
            echo "| Replay verification | test / verify:ci | CI Checks log |"
            echo "| Playthrough anomaly verification | test / verify:ci | gameplay-trust-gate-artifacts on failure |"
            echo "| Adversarial server authority | adversarial job | Adversarial Security Tests job summary |"
            echo ""
            echo "CI Checks outcome: ${{ steps.ci_checks.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            shared/coverage/
            engine/coverage/
            server/coverage/
          if-no-files-found: warn

      - name: Upload Gameplay Trust Gate Artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gameplay-trust-gate-artifacts
          path: |
            artifacts/playthrough/
            logs/server.log
            test-results/
          if-no-files-found: warn

  adversarial:
    name: Adversarial Security Tests
    # [Agent Guidance] This job enforces 'Database Environment Isolation' (AGENTS.md).
    # It ensures the server authority properly rejects spoofed inputs against a real Postgres container.
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: phalanxduel_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://phalanx_test:phx_test_local@localhost:5432/phalanxduel_test # secretlint-disable-line
      REQUIRE_ADVERSARIAL_POSTGRES: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Setup database users
        run: |
          psql postgresql://postgres@localhost:5432/phalanxduel_test -c "
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE USER phalanx_test WITH LOGIN PASSWORD 'phx_test_local';
            ALTER SCHEMA public OWNER TO phalanx_test;
            GRANT CONNECT ON DATABASE phalanxduel_test TO phalanx_test;
            GRANT CREATE ON DATABASE phalanxduel_test TO phalanx_test;
            GRANT CREATE, USAGE ON SCHEMA public TO phalanx_test;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES    TO phalanx_test;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO phalanx_test;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO phalanx_test;
            GRANT TEMP ON DATABASE phalanxduel_test TO phalanx_test;
          "

      - name: Build workspace packages
        run: corepack pnpm build

      - name: Run database migrations
        run: corepack pnpm --filter @phalanxduel/server db:migrate

      - name: Run Adversarial Tests
        id: adversarial_tests
        run: corepack pnpm --filter @phalanxduel/server test:adversarial

      - name: Adversarial Trust Gate Summary
        if: always()
        run: |
          {
            echo "## Adversarial Server Authority Gate"
            echo ""
            echo "| Gate | Protected lane | Evidence |"
            echo "|---|---|---|"
            echo "| Server-authority rejection coverage | adversarial | Run Adversarial Tests log |"
            echo "| Real Postgres path | adversarial | DATABASE_URL + REQUIRE_ADVERSARIAL_POSTGRES=1 |"
            echo ""
            echo "Adversarial tests outcome: ${{ steps.adversarial_tests.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-sdks:
    name: Publish SDK Artifacts
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            sdk/go/go.sum
            clients/go/duel-cli/go.sum

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Generate SDK artifacts
        run: |
          corepack pnpm build
          corepack pnpm openapi:gen
          corepack pnpm sdk:gen
          corepack pnpm --filter @phalanxduel/server exec vitest run tests/client-compatibility.test.ts

      - name: Upload Go SDK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdk-go
          path: sdk/go
          if-no-files-found: error

      - name: Upload TypeScript SDK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdk-ts
          path: sdk/ts
          if-no-files-found: error

  build:
    name: Build and Push
    needs: [test, adversarial]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            latest-main

      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}-${{ github.run_attempt }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote-production:
    name: 'Promote: Production'
    needs: [build]
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: https://play.phalanxduel.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR
        run: |
          docker pull "${{ needs.build.outputs.image_ref }}"
          docker tag "${{ needs.build.outputs.image_ref }}" phalanxduel-production:latest
          docker tag "${{ needs.build.outputs.image_ref }}" phalanxduel-admin:latest

      - name: Promote tested GHCR image to Fly.io production
        run: |
          flyctl deploy \
            --app phalanxduel-production \
            --config fly.production.toml \
            --local-only \
            --image phalanxduel-production:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Promote tested GHCR image to Fly.io admin
        run: |
          flyctl deploy \
            --app phalanxduel-admin \
            --config admin/fly.toml \
            --local-only \
            --image phalanxduel-admin:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

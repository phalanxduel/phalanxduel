name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: CI Checks
        run: |
          corepack pnpm build
          corepack pnpm openapi:gen
          corepack pnpm sdk:gen
          corepack pnpm verify:ci

  publish-sdks:
    name: Publish SDK Artifacts
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Generate SDK artifacts
        run: |
          corepack pnpm build
          corepack pnpm openapi:gen
          corepack pnpm sdk:gen

      - name: Upload Go SDK
        uses: actions/upload-artifact@v4
        with:
          name: sdk-go
          path: sdk/go
          if-no-files-found: error

      - name: Upload TypeScript SDK
        uses: actions/upload-artifact@v4
        with:
          name: sdk-ts
          path: sdk/ts
          if-no-files-found: error

  build:
    name: Build and Push
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            latest-main

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: 'Deploy: Staging'
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://phalanxduel-staging.fly.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy tested image to Fly.io
        run: |
          flyctl deploy \
            --app phalanxduel-staging \
            --config fly.staging.toml \
            --image ${{ needs.build.outputs.image_ref }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  promote-production:
    name: 'Promote: Production'
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://play.phalanxduel.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy tested image to Fly.io
        run: |
          flyctl deploy \
            --app phalanxduel-production \
            --config fly.production.toml \
            --image ${{ needs.build.outputs.image_ref }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
